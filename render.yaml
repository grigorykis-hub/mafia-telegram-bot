# Blueprint Render.com: Background Worker + Docker + диск для SQLite.
# Важно: у Render план free НЕ поддерживает background workers — нужен платный (starter и выше).
# Создайте Blueprint → подключите репозиторий → при первом деплое укажите секреты.

services:
  - type: worker
    name: mafia-telegram-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: starter
    branch: main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: ADMIN_USERNAMES
        sync: false
      - key: DB_PATH
        value: /data/mafia_bot.db
    disk:
      name: mafia-sqlite
      mountPath: /data
      sizeGB: 1
