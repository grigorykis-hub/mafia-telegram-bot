# Собирает образ и публикует в GitHub Container Registry (ghcr.io).
# После push в ветку main: в GitHub → Packages появится образ.
# На VPS: docker pull ghcr.io/ВАШ_LOGIN/РЕПОЗИТОРИЙ:latest и запуск с теми же переменными, что в .env

name: Publish Docker image

on:
  push:
    branches: [main, master]
    paths:
      - Dockerfile
      - docker-compose.yml
      - requirements.txt
      - "**.py"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase)
        id: meta
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.IMAGE }}:latest
            ${{ steps.meta.outputs.IMAGE }}:${{ github.sha }}
