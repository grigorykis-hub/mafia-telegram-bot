# Запуск 24/7: на сервере в папке проекта создайте .env (см. .env.example), затем:
#   docker compose up -d --build
# Логи: docker compose logs -f

name: mafia-telegram-bot

services:
  mafia-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mafia-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /data/mafia_bot.db
      WEBAPP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - mafia_sqlite:/data

volumes:
  mafia_sqlite:
