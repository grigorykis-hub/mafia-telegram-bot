<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OPC · Иваново</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #f3ece0;
      --card: #ffffff;
      --border: #ddd0bc;
      --gold: #c4892a;
      --gold-dark: #8a5a12;
      --text: #3b2f24;
      --muted: #8a7a68;
      --green: #d8f0df;
      --green-text: #2f7a45;
      --orange: #fde8cc;
      --orange-text: #b86b12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 14px 14px 28px;
      min-height: 100vh;
    }
    .hero {
      background: linear-gradient(135deg, #f8e4b8 0%, #e8c06a 55%, #d9a84a 100%);
      border-radius: 18px;
      padding: 22px 18px;
      text-align: center;
      margin-bottom: 18px;
      box-shadow: 0 2px 12px rgba(180, 130, 40, 0.15);
    }
    .hero h1 {
      font-size: 34px;
      font-weight: 800;
      color: var(--gold-dark);
      letter-spacing: 1px;
    }
    .hero .city {
      margin-top: 6px;
      font-size: 15px;
      color: #6a4f1e;
      font-weight: 500;
    }
    .hero .tagline {
      margin-top: 10px;
      font-size: 13px;
      color: #7a5c22;
      font-style: italic;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 4px 10px;
    }
    .events { margin-bottom: 22px; }
    .event-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: transform 0.12s ease;
    }
    .event-card:active { transform: scale(0.98); }
    .event-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .icon-mafia { background: #fde8ea; }
    .icon-masterclass { background: #f5e8d8; }
    .icon-codenames { background: #dff3f0; }
    .icon-default { background: #eee; }
    .event-body { flex: 1; min-width: 0; }
    .event-title {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-meta {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }
    .event-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 5px 9px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .badge-ok { background: var(--green); color: var(--green-text); }
    .badge-warn { background: var(--orange); color: var(--orange-text); }
    .empty {
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .menu-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #faf6ef;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px 16px;
      margin-bottom: 10px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }
    .menu-btn:active { background: #f0e8da; }
    .menu-btn .ico { font-size: 20px; width: 28px; text-align: center; }
    .footer {
      margin-top: 18px;
      text-align: right;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #b5a894;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>OPC</h1>
    <div class="city">Иваново · ул. Ленина</div>
    <div class="tagline">Твоя кофейня — твои игры</div>
  </div>

  <div class="section-title">БЛИЖАЙШИЕ МЕРОПРИЯТИЯ</div>
  <div class="events" id="events"></div>

  <div class="section-title">РАЗДЕЛЫ</div>
  <button class="menu-btn" data-action="menu:games"><span class="ico">🎮</span>Игры</button>
  <button class="menu-btn" data-action="menu:masterclass"><span class="ico">🎨</span>Мастер-классы</button>
  <button class="menu-btn" data-action="menu:calendar"><span class="ico">📅</span>Календарь всех мероприятий</button>

  <div class="footer">ГЛАВНОЕ МЕНЮ</div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const TYPE_ICON = { mafia: "🌙", codenames: "🕵", masterclass: "🎨" };
    const TYPE_LABEL = { mafia: "Мафия", codenames: "Коднеймс", masterclass: "МК" };
    const TYPE_CLASS = { mafia: "icon-mafia", codenames: "icon-codenames", masterclass: "icon-masterclass" };

    function send(action) {
      tg.sendData(action);
      tg.close();
    }

    document.querySelectorAll(".menu-btn").forEach((btn) => {
      btn.addEventListener("click", () => send(btn.dataset.action));
    });

    function fmtDate(iso) {
      const [y, m, d] = iso.split("-");
      return `${d}.${m}`;
    }

    function badgeClass(filled, max) {
      return filled / max >= 0.85 ? "badge-warn" : "badge-ok";
    }

    async function loadEvents() {
      const root = document.getElementById("events");
      try {
        const res = await fetch("/api/events");
        const events = await res.json();
        if (!events.length) {
          root.innerHTML = '<div class="empty">Пока ничего не запланировано</div>';
          return;
        }
        root.innerHTML = events.map((ev) => {
          const icon = TYPE_ICON[ev.event_type] || "🎪";
          const cls = TYPE_CLASS[ev.event_type] || "icon-default";
          const label = TYPE_LABEL[ev.event_type] || "Событие";
          const bc = badgeClass(ev.filled, ev.max_players);
          return `
            <div class="event-card" data-id="${ev.id}">
              <div class="event-icon ${cls}">${icon}</div>
              <div class="event-body">
                <div class="event-title">${ev.title}</div>
                <div class="event-meta">${icon} ${label} · ${fmtDate(ev.event_date)} · ${ev.event_time}</div>
              </div>
              <div class="event-badge ${bc}">${ev.filled}/${ev.max_players}</div>
            </div>`;
        }).join("");

        root.querySelectorAll(".event-card").forEach((card) => {
          card.addEventListener("click", () => send(`event:view:${card.dataset.id}`));
        });
      } catch (e) {
        root.innerHTML = '<div class="empty">Не удалось загрузить события</div>';
      }
    }

    loadEvents();
  </script>
</body>
</html>
